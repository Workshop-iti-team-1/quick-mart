query GetCustomerOrders($customerAccessToken: String!, $first: Int!, $after: String) {
  customer(customerAccessToken: $customerAccessToken) {
    id
    firstName
    orders(first: $first, after: $after, sortKey: PROCESSED_AT, reverse: true) {
      edges {
        cursor
        node {
          id
          orderNumber
          processedAt
          financialStatus
          fulfillmentStatus
          currentTotalPrice {
            amount
            currencyCode
          }
          currentSubtotalPrice {
            amount
            currencyCode
          }
          discountApplications(first: 5) {
            edges {
              node {
                ... on DiscountCodeApplication {
                  code
                  value {
                    ... on PricingPercentageValue {
                      percentage
                    }
                    ... on MoneyV2 {
                      amount
                      currencyCode
                    }
                  }
                }
              }
            }
          }
          lineItems(first: 10) {
            edges {
              node {
                title
                quantity
                originalTotalPrice {
                  amount
                  currencyCode
                }
                variant {
                  id
                  title
                  image {
                    url
                  }
                }
              }
            }
          }
          shippingAddress {
            firstName
            lastName
            address1
            city
            country
            phone
          }
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}
